services:

  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  # On first start this creates hft_db and runs nexus3d_setup.sql.
  # The 3DCityDB citydb schema (40k buildings) must be restored separately:
  #   pg_dump -Fc -h <university-server> hft_db > hft_db.dump
  #   docker compose exec db pg_restore -U postgres -d hft_db /dumps/hft_db.dump
  # Mount the dump file via the ./dumps volume below, then run the restore.
  db:
    image: postgis/postgis:14-3.4
    environment:
      POSTGRES_DB: hft_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./stuttgart-backend/nexus3d_setup.sql:/docker-entrypoint-initdb.d/01_nexus3d.sql
      - ./dumps:/dumps   # place hft_db.dump here for restore
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hft_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Node.js backend ─────────────────────────────────────────────────────────
  backend:
    build: ./stuttgart-backend
    env_file: ./stuttgart-backend/.env
    environment:
      DB_HOST: db       # overrides the localhost in .env; container talks to db service
    ports:
      - "5000:5000"
    volumes:
      - tiles:/app/public/tiles          # IFC tiles (generated by pg2b3dm)
      - tiles_citydb:/app/public/tiles_citydb  # full-city LoD2 tiles
      - ./media:/app/media               # QField photos (optional)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Vite frontend ───────────────────────────────────────────────────────────
  frontend:
    build: ./stuttgart-digital-twin
    env_file: ./stuttgart-digital-twin/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  tiles:
  tiles_citydb:
