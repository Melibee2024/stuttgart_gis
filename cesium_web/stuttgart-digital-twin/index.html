<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Stuttgart Urban Digital Twin</title>

    <script src="https://cdn.jsdelivr.net/npm/cesium@1.141.0/Build/Cesium/Cesium.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/cesium@1.141.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        /* =====================================================================
           1. RESET & APP STRUCTURE
           ===================================================================== */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; color: #f8fafc;
        }

        #app {
            display: flex; height: 100vh; width: 100vw; position: relative; overflow: hidden;
        }

        /* =====================================================================
           2. SIDEBAR LAYOUTS (Left and Right Panes)
           ===================================================================== */
        .sidebar {
            background-color: rgba(15, 23, 42, 0.95);
            padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 20px;
            z-index: 10; border-right: 1px solid #334155;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* Left Pane: Fixed and always visible */
        #left-sidebar {
            width: 280px; flex-shrink: 0;
        }

        /* Right Pane: Slides in conditionally when a building is clicked */
        #right-sidebar {
            width: 380px;
            border-left: 1px solid #334155; border-right: none;
            position: absolute; right: 0; height: 100%;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #right-sidebar.active {
            transform: translateX(0);
        }

        /* =====================================================================
           3. CENTER MAP & UI ELEMENTS
           ===================================================================== */
        #cesiumContainer {
            flex-grow: 1; position: relative; height: 100%; width: 100%;
        }

        h2 { font-size: 1.1rem; color: #38bdf8; margin: 0 0 10px 0; border-bottom: 1px solid #38bdf8; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        h3 { font-size: 1rem; color: #4ade80; margin: 0 0 8px 0; }

        select, button {
            width: 100%; padding: 10px; margin-bottom: 10px;
            background-color: #1e293b; color: white;
            border: 1px solid #475569; border-radius: 4px;
            cursor: pointer; font-size: 0.9rem; transition: background 0.2s;
        }
        select:hover, button:hover { background-color: #334155; }

        /* Data Tables for ALKIS output */
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 15px; }
        .data-table th { text-align: left; color: #94a3b8; padding: 6px 0; border-bottom: 1px solid #334155; font-weight: normal;}
        .data-table td { text-align: right; font-family: monospace; padding: 6px 0; border-bottom: 1px solid #334155; word-break: break-all;}

        /* Photo attachments styling */
        .photo-container { margin-top: 15px; border-top: 1px dashed #475569; padding-top: 15px; }
        .photo-container img { width: 100%; border-radius: 4px; border: 1px solid #475569; display: block; margin-top: 5px; }
        .photo-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="app">

        <aside id="left-sidebar" class="sidebar">

            <div>
                <h2>🎨 Thematic Filters</h2>
                <label style="font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 5px;">Classification Theme:</label>
                <select id="colorDropdown">
                    <option value="standard">Standard (ALKIS Base)</option>
                    <option value="neon">High Contrast Neon</option>
                    <option value="monochrome">Grayscale Focus</option>
                </select>
                <div id="legendContainer" style="font-size: 0.85rem; line-height: 1.8; margin-top: 10px;">
                    </div>
            </div>

            <div style="margin-top: auto;">
                <h2 style="color: #fbbf24; border-bottom-color: #fbbf24;">📐 Spatial Tools</h2>
                <button id="btnDist" style="text-align: left;">📏 Measure Distance</button>
                <button id="btnHeight" style="text-align: left;">🏢 Measure Height Delta</button>
                <button id="btnClearTools" style="border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); margin-top: 10px; text-align: center;">🗑️ Clear Measurements</button>
                <div id="measureFeedback" style="margin-top: 10px; font-size: 0.85rem; color: #4ade80; font-family: monospace; display: none; padding: 8px; background: rgba(0,0,0,0.3); border-left: 3px solid #4ade80;"></div>
            </div>
        </aside>

        <main id="cesiumContainer"></main>

        <aside id="right-sidebar" class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h2>🏛️ Asset Profile</h2>
                <button id="closeSidebar" style="width: auto; padding: 2px 8px; background: none; border: 1px solid #ef4444; color: #ef4444; border-radius: 4px;">✕</button>
            </div>

            <div id="alkisDataContainer">
                <table class="data-table">
                    <thead>
                        <tr><th>Attribute Key</th><th style="text-align: right;">Value</th></tr>
                    </thead>
                    <tbody id="alkisTableBody">
                        </tbody>
                </table>
            </div>

            <div>
                <h3>📱 QField Verification</h3>
                <div id="qfieldDataContainer" style="font-size: 0.85rem; line-height: 1.6; color: #cbd5e1;">
                    </div>
            </div>
        </aside>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
