name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'cesium_web/stuttgart-digital-twin/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cesium_web/stuttgart-digital-twin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Fetch city-base tiles (from GitHub Release — kept out of git history)
        run: |
          curl -fL -o tiles_citydb.zip \
            "https://github.com/Melibee2024/stuttgart_gis/releases/download/tiles-v1/tiles_citydb.zip"
          mkdir -p public/tiles_citydb
          unzip -q tiles_citydb.zip -d public/tiles_citydb
          rm tiles_citydb.zip
          test -f public/tiles_citydb/tileset.json && echo "✓ city base ready"
      - run: npm run build
        env:
          # Restricted, read-only Cesium ion token (must allow asset 5007195 +
          # World Terrain). Stored as a repo secret, never committed.
          VITE_ION_TOKEN: ${{ secrets.VITE_ION_TOKEN }}
          # Point all /api and /media calls at the site itself, so they resolve to
          # the bundled static snapshot (public/api, public/media) — no backend.
          VITE_API_BASE: /stuttgart_gis
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cesium_web/stuttgart-digital-twin/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
