name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'cesium_web/stuttgart-digital-twin/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cesium_web/stuttgart-digital-twin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          # Restricted, read-only Cesium ion token (must allow asset 5007195 +
          # World Terrain). Stored as a repo secret, never committed.
          VITE_ION_TOKEN: ${{ secrets.VITE_ION_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cesium_web/stuttgart-digital-twin/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
